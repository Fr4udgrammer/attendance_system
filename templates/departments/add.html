{% extends 'base.html' %}

{% block title %}Add Department - AttendanceX{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-building"></i>
        Add Department
    </h1>
    <div class="page-actions">
        <a href="/departments/" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>
    </div>
</div>

<div class="form-card">
    <form method="post" class="futuristic-form">
        {% csrf_token %}

        <div class="form-section">
            <h3><i class="fas fa-info-circle"></i> Department Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Department Name</label>
                    <input type="text" name="name" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Department Code</label>
                    <input type="text" name="code" required class="form-input" placeholder="e.g., ENG, HR, FIN">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Department Head</label>
                    <select name="head" class="form-input">
                        <option value="">Select Department Head</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group"></div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" class="form-input" placeholder="Department description..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save"></i>
                Create Department
            </button>
        </div>
    </form>
</div>
{% endblock %}
