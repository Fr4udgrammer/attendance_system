{% extends 'base.html' %}

{% block title %}Edit Employee - AttendanceX{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">
        <i class="fas fa-user-edit"></i>
        Edit Employee
    </h1>
    <div class="page-actions">
        <a href="/employees/" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i>
            Back
        </a>
    </div>
</div>

<div class="form-card">
    <form method="post" class="futuristic-form">
        {% csrf_token %}

        <div class="form-section">
            <h3><i class="fas fa-user"></i> Personal Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ employee.user.first_name }}" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ employee.user.last_name }}" required class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ employee.user.email }}" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role" class="form-input">
                        <option value="employee" {% if employee.user.role == 'employee' %}selected{% endif %}>Employee</option>
                        <option value="manager" {% if employee.user.role == 'manager' %}selected{% endif %}>Manager</option>
                        <option value="admin" {% if employee.user.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3><i class="fas fa-briefcase"></i> Employment Details</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" name="employee_id" value="{{ employee.employee_id }}" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select name="department" required class="form-input">
                        {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if employee.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" name="position" value="{{ employee.position }}" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Hire Date</label>
                    <input type="date" name="hire_date" value="{{ employee.hire_date|date:'Y-m-d' }}" required class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select name="status" class="form-input">
                        <option value="active" {% if employee.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if employee.status == 'inactive' %}selected{% endif %}>Inactive</option>
                        <option value="on_leave" {% if employee.status == 'on_leave' %}selected{% endif %}>On Leave</option>
                    </select>
                </div>
                <div class="form-group"></div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save"></i>
                Update Employee
            </button>
        </div>
    </form>
</div>
{% endblock %}
