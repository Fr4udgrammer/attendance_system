{% extends 'base.html' %}

{% block title %}Check-In - AttendanceX{% endblock %}

{% block extra_css %}
<style>
    .verification-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
    }
    .scanner-card {
        background: rgba(16, 18, 27, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        width: 100%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    }
    .camera-viewport {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        background: #000;
        border-radius: 12px;
        margin-bottom: 20px;
        overflow: hidden;
        border: 2px solid var(--accent-color, #00d2ff);
    }
    #camera-feed {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .scan-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 2px solid transparent;
        box-sizing: border-box;
        pointer-events: none;
    }
    .scan-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: rgba(0, 210, 255, 0.5);
        box-shadow: 0 0 15px 5px rgba(0, 210, 255, 0.5);
        top: 0;
        animation: scan 3s linear infinite;
    }
    @keyframes scan {
        0% { top: 0%; }
        50% { top: 100%; }
        100% { top: 0%; }
    }
    .scan-corners {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        border: 2px solid rgba(0, 210, 255, 0.3);
        border-radius: 10px;
    }
    .status-msg {
        margin-top: 20px;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }
    .verifying-spinner {
        display: none;
        margin: 20px auto;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(0, 210, 255, 0.1);
        border-left-color: #00d2ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    #result-message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 8px;
        display: none;
    }
    .result-success { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
    .result-error { background: rgba(255, 78, 80, 0.1); color: #ff4e50; }
</style>
{% endblock %}

{% block content %}
<div class="verification-container">
    <div class="scanner-card">
        <h2 class="mb-4"><i class="fas fa-fingerprint text-accent"></i> Identity Verification</h2>
        
        <div class="camera-viewport">
            <video id="camera-feed" autoplay playsinline muted></video>
            <div class="scan-overlay">
                <div class="scan-line"></div>
                <div class="scan-corners"></div>
            </div>
        </div>

        <div id="status-text" class="status-msg text-accent">
            READY TO SCAN
        </div>
        
        <div id="spinner" class="verifying-spinner"></div>
        
        <div id="result-message"></div>

        <div class="mt-4">
            <button id="verify-btn" class="btn btn-primary btn-lg w-100">
                <i class="fas fa-camera"></i> Verify & Check-In
            </button>
            <p class="text-muted mt-3 small">
                Position your face within the frame and ensure good lighting.
            </p>
        </div>
    </div>
</div>

<canvas id="capture-canvas" style="display: none;"></canvas>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('camera-feed');
    const verifyBtn = document.getElementById('verify-btn');
    const statusText = document.getElementById('status-text');
    const spinner = document.getElementById('spinner');
    const resultMsg = document.getElementById('result-message');
    const canvas = document.getElementById('capture-canvas');

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function captureFrames(frameCount = 3, intervalMs = 220) {
        const frames = [];
        for (let i = 0; i < frameCount; i++) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            frames.push(canvas.toDataURL('image/jpeg'));
            if (i < frameCount - 1) {
                await sleep(intervalMs);
            }
        }
        return frames;
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });
            video.srcObject = stream;
        } catch (err) {
            console.error("Camera access denied:", err);
            statusText.innerText = "CAMERA ACCESS ERROR";
            statusText.className = "status-msg text-danger";
        }
    }

    verifyBtn.addEventListener('click', async () => {
        if (!video.videoWidth || !video.videoHeight) {
            resultMsg.innerText = "Camera is still initializing. Please try again.";
            resultMsg.className = "p-3 rounded mb-3 result-error";
            resultMsg.style.display = 'block';
            return;
        }

        // UI State
        verifyBtn.disabled = true;
        statusText.innerText = "VERIFYING IDENTITY...";
        spinner.style.display = 'block';
        resultMsg.style.display = 'none';

        const frames = await captureFrames(3, 220);

        try {
            const response = await fetch('/api/attendance/api/verify-face/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ face_frames: frames })
            });

            const data = await response.json();
            spinner.style.display = 'none';

            if (data.success) {
                statusText.innerText = "VERIFIED";
                statusText.className = "status-msg text-success";
                resultMsg.innerText = data.message;
                resultMsg.className = "p-3 rounded mb-3 result-success";
                resultMsg.style.display = 'block';
                
                // Redirect after success
                setTimeout(() => {
                    window.location.href = '/attendance/';
                }, 2000);
            } else {
                statusText.innerText = "VERIFICATION FAILED";
                statusText.className = "status-msg text-danger";
                resultMsg.innerText = data.error || "Could not recognize identity";
                resultMsg.className = "p-3 rounded mb-3 result-error";
                resultMsg.style.display = 'block';
                verifyBtn.disabled = false;
            }
        } catch (err) {
            console.error("Verification error:", err);
            spinner.style.display = 'none';
            statusText.innerText = "SYSTEM ERROR";
            resultMsg.innerText = "An error occurred during verification. Please try again.";
            resultMsg.className = "p-3 rounded mb-3 result-error";
            resultMsg.style.display = 'block';
            verifyBtn.disabled = false;
        }
    });

    initCamera();
});
</script>
{% endblock %}
